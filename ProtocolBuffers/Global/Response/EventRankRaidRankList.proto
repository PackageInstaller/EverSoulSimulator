syntax = "proto3";

package EsPb;

message EventRankRaidRankList {
  sEventRankRaidRank myEventRankRaidRanking = 1;
  repeated sEventRankRaidRank eventRankRaidRanking = 2;
}

message sEventRankRaidRank {
  string userIdx = 1;
  string nickName = 2;
  sThumbnail thumbnail = 3;
  int32 rank = 4;
  int32 userDamage = 5;
}

message sThumbnail {
  int32 thumbnailFrame = 1;
  int32 thumbnailImage = 2;
  bool useCustom = 3;
  bytes thumbnail = 4;
  int32 firstTitle = 5;
  int32 secondTitle = 6;
}

