syntax = "proto3";

package EsPb;

message OriginTowerList {
  repeated sOriginTower originTower = 1;
  repeated sOriginTowerExtend originTowerExtend = 2;
}

message sOriginTower {
  int32 towerNo = 1;
  int32 stageNo = 2;
  string firstConquerorUserIdx = 3;
  string firstConquerorNickName = 4;
  sThumbnail firstConquerorThumbnail = 5;
}

message sThumbnail {
  int32 thumbnailFrame = 1;
  int32 thumbnailImage = 2;
  bool useCustom = 3;
  bytes thumbnail = 4;
  int32 firstTitle = 5;
  int32 secondTitle = 6;
}

message sOriginTowerExtend {
  int32 towerNo = 1;
  int32 myRank = 2;
  int32 myClearStageNo = 3;
  int64 myBattleTs = 4;
  int32 rankRewardReceiveFlag = 5;
  repeated sOriginTowerExtendRank originTowerExtendRank = 6;
  int64 playStartDt = 7;
  int64 playEndDt = 8;
  int64 adjustmentStartDt = 9;
  int64 adjustmentEndDt = 10;
  int64 rewardStartDt = 11;
  int64 rewardEndDt = 12;
}

message sOriginTowerExtendRank {
  string userIdx = 1;
  string nickname = 2;
  sThumbnail thumbnail = 3;
  int32 rank = 4;
  int32 clearStageNo = 5;
  int64 battleTs = 6;
}

