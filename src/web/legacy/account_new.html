<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EverSoul — New Account</title>
<link rel="stylesheet" href="/web/style.css"/>
</head>
<body class="acct-body">

<div id="acct-root" class="acct-root">
  <header class="acct-header">
    <div>
      <h1 class="acct-logo">EverSoul</h1>
      <p class="acct-logo-sub">OFFLINE SIMULATOR</p>
    </div>
    <a href="/web/account_select.html" class="btn text-xs text-gray-400 hover:text-white">&lt; Back</a>
  </header>

  <article class="card">
    <header class="card-header">
      <span class="nav-icon">+</span>
      <h2 class="card-title" data-i18n="new_acct.title">새 계정</h2>
    </header>
    <div class="card-body">
      <div class="flex flex-col gap-1 mb-3">
        <label class="text-xs text-gray-400 tracking-wide" for="new-nick" data-i18n="new_acct.nick_label">닉네임</label>
        <input id="new-nick" type="text" data-i18n-placeholder="new_acct.nick_placeholder"
               placeholder="닉네임" maxlength="20" autocomplete="off" class="w-full bg-gray-900/80 border border-gray-700 text-white px-3 py-1.5 text-sm rounded outline-none focus:border-blue-500"/>
      </div>
      <div class="flex flex-col gap-1 mb-3">
        <label class="text-xs text-gray-400 tracking-wide" for="new-profile" data-i18n="new_acct.profile_label">계정 유형</label>
        <select id="new-profile" class="w-full bg-gray-900/80 border border-gray-700 text-white px-3 py-1.5 text-sm rounded outline-none focus:border-blue-500">
          <option value="responses" data-i18n="new_acct.profile_full">기존 계정 (덤프 데이터)</option>
          <option value="responses_newbie" data-i18n="new_acct.profile_newbie">신규 계정</option>
        </select>
      </div>
      <div class="flex flex-col gap-1 mb-3">
        <label class="text-xs text-gray-400 tracking-wide" for="new-idp" data-i18n="new_acct.idp_label">로그인 방식</label>
        <select id="new-idp" class="w-full bg-gray-900/80 border border-gray-700 text-white px-3 py-1.5 text-sm rounded outline-none focus:border-blue-500">
          <option value="zd3" data-i18n="new_acct.idp_guest">게스트</option>
          <option value="google">Google</option>
          <option value="kakaocapri" data-i18n="new_acct.idp_kakao">카카오</option>
        </select>
      </div>
      <div class="flex flex-col gap-1 mb-3">
        <label class="text-xs text-gray-400 tracking-wide" for="new-playerid" data-i18n="new_acct.playerid_label">Player ID</label>
        <input id="new-playerid" type="text" data-i18n-placeholder="new_acct.playerid_placeholder"
               placeholder="(기본값 사용)" maxlength="32" autocomplete="off" class="w-full bg-gray-900/80 border border-gray-700 text-white px-3 py-1.5 text-sm rounded outline-none focus:border-blue-500"/>
      </div>
      <button class="btn btn-primary acct-create-btn" onclick="createAccount()"
        data-i18n="new_acct.create_btn">+ 새 계정 만들기</button>
      <output class="acct-status" id="create-status"></output>
    </div>
  </article>
</div>

<script src="/web/account_i18n.js"></script>
<script src="/web/account_new.js"></script>
</body>
</html>
