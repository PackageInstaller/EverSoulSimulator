<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EverSoul — Account Select</title>
<link rel="stylesheet" href="/web/style.css"/>
</head>
<body class="acct-body">


<div id="acct-root" class="acct-root">
  <header class="acct-header">
    <div>
      <h1 class="acct-logo">EverSoul</h1>
      <p class="acct-logo-sub">OFFLINE SIMULATOR</p>
    </div>

  </header>

  <article class="card">
    <header class="card-header">
      <span class="nav-icon">◈</span>
      <h2 class="card-title" data-i18n="page.title">계정 선택</h2>
    </header>
    <div class="card-body">
      <p class="acct-subtitle" data-i18n="acct.subtitle">계정을 선택하거나 새로 만드세요.</p>
      <div id="acct-list" class="acct-list">
        <div class="acct-empty"><span class="t-spinner"></span> <span data-i18n="acct.loading">로딩 중…</span></div>
      </div>
      <div id="play-bar" class="flex items-center justify-between gap-3 mt-4">
        <a href="/web/account_new.html" class="btn" data-i18n="new_acct.create_btn">+ 새 계정 만들기</a>
        <span id="play-hint" class="text-xs text-gray-500 flex-1 text-center" data-i18n="acct.play_hint">계정을 선택하세요</span>
        <button id="btn-play" class="btn btn-primary" disabled onclick="playSelected()" data-i18n="acct.play_btn">▶ 플레이</button>
      </div>
    </div>
  </article>
</div>

<script src="/web/account_i18n.js"></script>
<script src="/web/account_select.js"></script>
</body>
</html>
