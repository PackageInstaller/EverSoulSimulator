<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EverSoul — Account Select</title>
<link rel="stylesheet" href="/web/style.css"/>
</head>
<body class="acct-body">


<div id="acct-root" class="acct-root">
  <header class="acct-header">
    <div>
      <h1 class="acct-logo">EverSoul</h1>
      <p class="acct-logo-sub">OFFLINE SIMULATOR</p>
    </div>

  </header>

  <article class="card">
    <header class="card-header">
      <span class="nav-icon">◈</span>
      <h2 class="card-title" data-i18n="page.title">계정 선택</h2>
    </header>
    <div class="card-body">
      <p class="acct-subtitle" data-i18n="acct.subtitle">계정을 선택하거나 새로 만드세요.</p>
      <div id="acct-list" class="acct-list">
        <div class="acct-empty"><span class="t-spinner"></span> <span data-i18n="acct.loading">로딩 중…</span></div>
      </div>
      <div id="play-bar" class="play-bar">
        <span id="play-hint" class="play-hint" data-i18n="acct.play_hint">계정을 선택하세요</span>
        <button id="btn-play" class="btn btn-play" disabled onclick="playSelected()" data-i18n="acct.play_btn">▶ 플레이</button>
      </div>
    </div>
  </article>

  <article class="card acct-new-card">
    <header class="card-header">
      <span class="nav-icon">+</span>
      <h2 class="card-title" data-i18n="new_acct.title">새 계정</h2>
    </header>
    <div class="card-body">
      <div class="setting-row">
        <label class="setting-label" for="new-nick" data-i18n="new_acct.nick_label">닉네임</label>
        <input id="new-nick" type="text" data-i18n-placeholder="new_acct.nick_placeholder"
               placeholder="닉네임" maxlength="20" autocomplete="off" class="acct-nick-input"/>
      </div>
      <div class="setting-row">
        <label class="setting-label" for="new-profile" data-i18n="new_acct.profile_label">계정 유형</label>
        <select id="new-profile" class="acct-nick-input">
          <option value="responses" data-i18n="new_acct.profile_full">기존 계정 (덤프 데이터)</option>
          <option value="responses_newbie" data-i18n="new_acct.profile_newbie">신규 계정</option>
        </select>
      </div>
      <div class="setting-row">
        <label class="setting-label" for="new-idp" data-i18n="new_acct.idp_label">로그인 방식</label>
        <select id="new-idp" class="acct-nick-input">
          <option value="zd3" data-i18n="new_acct.idp_guest">게스트</option>
          <option value="google">Google</option>
          <option value="kakaocapri" data-i18n="new_acct.idp_kakao">카카오</option>
        </select>
      </div>
      <div class="setting-row">
        <label class="setting-label" for="new-playerid" data-i18n="new_acct.playerid_label">Player ID</label>
        <input id="new-playerid" type="text" data-i18n-placeholder="new_acct.playerid_placeholder"
               placeholder="(기본값 사용)" maxlength="32" autocomplete="off" class="acct-nick-input"/>
      </div>
      <button class="btn btn-primary acct-create-btn" onclick="createAccount()"
        data-i18n="new_acct.create_btn">+ 새 계정 만들기</button>
      <output class="acct-status" id="create-status"></output>
    </div>
  </article>
</div>

<script src="/web/account_i18n.js"></script>
<script src="/web/account_select.js"></script>
</body>
</html>
