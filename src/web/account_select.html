<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EverSoul — Account Select</title>
<link rel="stylesheet" href="/web/style.css"/>
</head>
<body class="acct-body">

<dialog id="lang-overlay">
  <article id="lang-select-box">
    <h1 class="lang-select-logo">EverSoul</h1>
    <p class="lang-select-sub">Offline Simulator</p>
    <h2 class="lang-select-title">Select Language / 언어 선택 / 选择语言</h2>
    <nav class="lang-select-row">
      <button class="lang-select-btn" onclick="initLang('ko')">한국어</button>
      <button class="lang-select-btn" onclick="initLang('en')">English</button>
      <button class="lang-select-btn" onclick="initLang('zh')">中文</button>
      <button class="lang-select-btn" onclick="initLang('ru')">Русский</button>
      <button class="lang-select-btn" onclick="initLang('de')">Deutsch</button>
      <button class="lang-select-btn" onclick="initLang('fr')">Français</button>
      <button class="lang-select-btn" onclick="initLang('vi')">Tiếng Việt</button>
    </nav>
  </article>
</dialog>

<div id="acct-root" class="acct-root">
  <header class="acct-header">
    <div>
      <h1 class="acct-logo">EverSoul</h1>
      <p class="acct-logo-sub">OFFLINE SIMULATOR</p>
    </div>
    <div class="lang-row">
      <button class="lang-btn" id="lbtn-ko" onclick="setLang('ko')">한국어</button>
      <button class="lang-btn" id="lbtn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="lbtn-zh" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" id="lbtn-ru" onclick="setLang('ru')">RU</button>
      <button class="lang-btn" id="lbtn-de" onclick="setLang('de')">DE</button>
      <button class="lang-btn" id="lbtn-fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" id="lbtn-vi" onclick="setLang('vi')">VI</button>
    </div>
  </header>

  <article class="card">
    <header class="card-header">
      <span class="nav-icon">◈</span>
      <h2 class="card-title" data-i18n="page.title">계정 선택</h2>
    </header>
    <div class="card-body">
      <p class="acct-subtitle" data-i18n="acct.subtitle">계정을 선택하거나 새로 만드세요.</p>
      <div id="acct-list" class="acct-list">
        <div class="acct-empty"><span class="t-spinner"></span> <span data-i18n="acct.loading">로딩 중…</span></div>
      </div>
    </div>
  </article>

  <article class="card acct-new-card">
    <header class="card-header">
      <span class="nav-icon">+</span>
      <h2 class="card-title" data-i18n="new_acct.title">새 계정</h2>
    </header>
    <div class="card-body">
      <div class="setting-row">
        <label class="setting-label" for="new-nick" data-i18n="new_acct.nick_label">닉네임</label>
        <input id="new-nick" type="text" data-i18n-placeholder="new_acct.nick_placeholder"
               placeholder="닉네임" maxlength="20" autocomplete="off" class="acct-nick-input"/>
      </div>
      <button class="btn btn-primary acct-create-btn" onclick="createAccount()"
        data-i18n="new_acct.create_btn">+ 새 계정 만들기</button>
      <output class="acct-status" id="create-status"></output>
    </div>
  </article>
</div>

<script src="/web/account_i18n.js"></script>
<script src="/web/account_select.js"></script>
</body>
</html>
