<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Eversoul Offline</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101418;
      color: #f3f6f8;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    main {
      width: min(360px, calc(100vw - 32px));
    }
    h1 {
      margin: 0 0 24px;
      font-size: 24px;
      font-weight: 650;
      text-align: center;
    }
    a {
      display: block;
      margin: 12px 0;
      padding: 16px;
      border: 1px solid #3c4854;
      border-radius: 8px;
      background: #1b2229;
      color: #f3f6f8;
      text-align: center;
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
    }
    a:first-of-type {
      background: #26313a;
    }
  </style>
</head>
<body>
  <main>
    <h1>Eversoul Offline</h1>
    <a href="/account-mode/set?mode=full">Full account</a>
    <a href="/account-mode/set?mode=newbie">Newbie account</a>
  </main>
</body>
</html>
